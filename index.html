    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #b8860b;
            --burgundy: #800020;
            --dark: #0f0f0f;
        }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #1a0006 0%, #0f0f0f 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .font-cinzel {
            font-family: 'Cinzel', serif;
        }

        .logo-container {
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            animation: fadeInDown 1s ease-out;
        }

        .logo-img {
            width: 150px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(184, 134, 11, 0.3));
        }

        .links-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            padding-bottom: 3rem;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(184, 134, 11, 0.2);
            padding: 1rem;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }

        .link-card:hover {
            background: var(--burgundy);
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(184, 134, 11, 0.2);
        }

        .link-card span {
            position: relative;
            z-index: 1;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
            animation: fadeIn 1.5s ease;
        }

        .social-icons svg {
            fill: var(--gold);
            width: 24px;
            height: 24px;
            transition: transform 0.3s ease;
        }

        .social-icons a:hover svg {
            transform: scale(1.2);
            fill: white;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Delays para os links */
        .link-card:nth-child(1) { animation-delay: 0.2s; }
        .link-card:nth-child(2) { animation-delay: 0.4s; }
        .link-card:nth-child(3) { animation-delay: 0.6s; }
        .link-card:nth-child(4) { animation-delay: 0.8s; }
        .link-card:nth-child(5) { animation-delay: 1.0s; }
    </style>
